<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UltraForce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<a href="#login-form" class="skip-link">Ir para o formulário de login</a>
    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html"><h1>ULTRAFORCE</h1></a>
        </div>
        
        <div class="auth-box">
            <h2>Acesse sua conta</h2>
            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="ux@gmail.com" autocomplete="email" aria-required="true">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="123" autocomplete="current-password" aria-required="true">
                </div>
                
                <div class="auth-actions">
                    <label><input type="checkbox" id="keep-logged"> Lembrar-me</label>
                    <a href="esqueci-senha.html" class="forgot-pass">Esqueci a senha</a>
                </div>

                <p id="login-error" class="error-message" role="alert" aria-live="assertive" style="display: none;"></p>

                <button type="submit" class="btn-buy btn-large">ENTRAR</button>
            </form>
            
            <p class="auth-footer">Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
